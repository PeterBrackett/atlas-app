<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas — Country</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
</head>
<body>
<header class="site-header">
  <div>
    <h1>Atlas</h1>
    <div class="tagline" id="page-tagline">Country breakdown</div>
  </div>
  <div id="auth-status" style="font-size:0.82rem; color:#b9c6d3;"></div>
</header>
<nav class="breadcrumb"><a href="index.html">&larr; Global overview</a> &nbsp;|&nbsp; <a href="sources.html">Sources &amp; methodology</a></nav>

<main>
  <div class="summary-bar" id="summary-bar"></div>

  <h2>AUM by segment</h2>
  <table>
    <thead>
      <tr>
        <th>Segment</th>
        <th class="numeric">AUM (bn)</th>
        <th class="numeric">Equity allocation (bn)</th>
        <th>Basis</th>
      </tr>
    </thead>
    <tbody id="segment-rows"></tbody>
  </table>

  <p class="note" id="data-note"></p>

  <h2 style="margin-top:32px;">Research notes</h2>
  <div class="research-notes" id="research-notes">
    <p class="note">Loading notes…</p>
  </div>
</main>

<script>
let CURRENT_USER = null; // set by checkAuth(), null if not signed in
let COUNTRY_CODE = '';

function getCountryCode() {
  const params = new URLSearchParams(window.location.search);
  return (params.get('c') || '').toLowerCase();
}

async function checkAuth() {
  try {
    const res = await fetch('/.auth/me');
    const payload = await res.json();
    const principal = payload && payload.clientPrincipal;
    CURRENT_USER = principal ? (principal.userDetails || 'signed in') : null;
  } catch (e) {
    CURRENT_USER = null;
  }

  const el = document.getElementById('auth-status');
  if (CURRENT_USER) {
    el.innerHTML = `Signed in as ${CURRENT_USER} &nbsp;|&nbsp; <a href="/.auth/logout?post_logout_redirect_uri=${encodeURIComponent(window.location.href)}" style="color:#b9c6d3;">Log out</a>`;
  } else {
    el.innerHTML = `<a href="/.auth/login/aad?post_login_redirect_uri=${encodeURIComponent(window.location.href)}" style="color:#b9c6d3;">Log in to edit sources</a>`;
  }
}

async function loadData(code) {
  try {
    const res = await fetch(`/api/data/${code}`);
    if (!res.ok) throw new Error('API not ready');
    return await res.json();
  } catch (e) {
    // Falls back to a bundled sample file if one exists for this code
    // (currently only 'uk') until the SharePoint-backed API is confirmed live.
    const res = await fetch(`data/${code}.json`);
    if (!res.ok) throw new Error(`No data available for '${code}'`);
    return await res.json();
  }
}

async function loadNotes(code) {
  try {
    const res = await fetch(`/api/notes/${code}`);
    if (!res.ok) return '';
    return await res.text();
  } catch (e) {
    return '';
  }
}

async function applySource(segmentName, sourceIndex, buttonEl) {
  buttonEl.disabled = true;
  const originalText = buttonEl.textContent;
  buttonEl.textContent = 'Saving…';

  try {
    const res = await fetch('/api/segments/set-active-source', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ country: COUNTRY_CODE, segment: segmentName, sourceIndex })
    });
    const result = await res.json();

    if (!res.ok) {
      alert(`Couldn't switch source: ${result.error || 'unknown error'}`);
      buttonEl.disabled = false;
      buttonEl.textContent = originalText;
      return;
    }

    // Simplest reliable way to reflect the change everywhere on the page.
    window.location.reload();
  } catch (e) {
    alert('Could not reach the server to save this change.');
    buttonEl.disabled = false;
    buttonEl.textContent = originalText;
  }
}

async function load() {
  await checkAuth();

  const code = getCountryCode();
  COUNTRY_CODE = code;

  if (!code) {
    document.querySelector('main').innerHTML = '<p class="note">No country specified. Go back to the <a href="index.html">global overview</a> and pick one from the list.</p>';
    return;
  }

  let data;
  try {
    data = await loadData(code);
  } catch (e) {
    document.querySelector('main').innerHTML = `<p class="note">Couldn't load data for '${code}'. It may not be built out yet — check back from the <a href="index.html">global overview</a>.</p>`;
    return;
  }

  document.title = `Atlas — ${data.country_name}`;
  document.getElementById('page-tagline').textContent = `${data.country_name} — segment breakdown`;

  const segments = (data.segments || []).slice().sort((a, b) => b.aum_bn - a.aum_bn);
  const totalAum = segments.reduce((s, x) => s + x.aum_bn, 0);
  const topSegment = segments[0];

  document.getElementById('summary-bar').innerHTML = `
    <div class="stat-card"><div class="value">${totalAum.toLocaleString(undefined, {maximumFractionDigits: 1})}bn</div><div class="label">Total AUM tracked</div></div>
    <div class="stat-card"><div class="value">${segments.length}</div><div class="label">Segments populated</div></div>
    <div class="stat-card"><div class="value">${topSegment ? topSegment.segment : '—'}</div><div class="label">Largest segment</div></div>
  `;

  const basisClass = (basis) => {
    if (!basis) return 'bottom-up';
    if (basis.startsWith('Top-down')) return 'override';
    if (basis.startsWith('Industry')) return 'aggregate';
    return 'bottom-up';
  };

  const alternatesRow = (s, segIndex) => {
    if (!s.alternate_sources || !s.alternate_sources.length) return '';

    if (!CURRENT_USER) {
      // Read-only view for anyone not signed in.
      const items = s.alternate_sources.map(alt => {
        const activeTag = alt.active ? ' (currently shown)' : '';
        const aum = (typeof alt.aum_bn === 'number') ? alt.aum_bn.toLocaleString(undefined, {maximumFractionDigits: 2}) + 'bn' : '—';
        const note = alt.note ? ` — ${alt.note}` : '';
        return `<li><strong>${alt.basis}${activeTag}:</strong> ${aum}${alt.source ? ` (${alt.source})` : ''}${note}</li>`;
      }).join('');
      return `
        <tr>
          <td colspan="4" style="padding-top:0;">
            <details>
              <summary style="cursor:pointer; color:var(--muted); font-size:0.82rem;">Other sources for this segment</summary>
              <ul style="margin:8px 0 4px; padding-left:1.2em; font-size:0.85rem; color:var(--muted);">${items}</ul>
            </details>
          </td>
        </tr>`;
    }

    // Editable view once signed in — the server still checks whether this
    // specific signed-in user is actually allowed to save a change.
    const selectId = `source-select-${segIndex}`;
    const options = s.alternate_sources.map((alt, i) => {
      const aum = (typeof alt.aum_bn === 'number') ? alt.aum_bn.toLocaleString(undefined, {maximumFractionDigits: 2}) + 'bn' : '—';
      return `<option value="${i}" ${alt.active ? 'selected' : ''}>${alt.basis} — ${aum}${alt.source ? ` (${alt.source})` : ''}</option>`;
    }).join('');

    return `
      <tr>
        <td colspan="4" style="padding-top:0;">
          <div style="display:flex; align-items:center; gap:8px; font-size:0.85rem; color:var(--muted); flex-wrap:wrap;">
            <label for="${selectId}">Active source:</label>
            <select id="${selectId}" style="font-size:0.85rem; padding:2px 4px;">${options}</select>
            <button type="button" onclick="applySource(${JSON.stringify(s.segment)}, parseInt(document.getElementById('${selectId}').value, 10), this)"
              style="font-size:0.8rem; padding:3px 10px; border-radius:5px; border:1px solid var(--border); background:var(--card); cursor:pointer;">
              Apply
            </button>
          </div>
        </td>
      </tr>`;
  };

  const rows = segments.map((s, i) => `
    <tr>
      <td>${s.segment}</td>
      <td class="numeric">${s.aum_bn.toLocaleString(undefined, {maximumFractionDigits: 2})}</td>
      <td class="numeric">${(s.equity_allocation_bn || 0).toLocaleString(undefined, {maximumFractionDigits: 2})}</td>
      <td><span class="badge ${basisClass(s.basis)}">${s.basis || ''}</span></td>
    </tr>
    ${alternatesRow(s, i)}
  `).join('');

  document.getElementById('segment-rows').innerHTML = rows;
  document.getElementById('data-note').textContent = data.source_note || '';

  const notesText = await loadNotes(code);
  const notesEl = document.getElementById('research-notes');
  if (!notesText || !notesText.trim()) {
    notesEl.innerHTML = `<p class="note">No research notes written yet for ${data.country_name}. Add a file called <code>${code}-notes.md</code> to the AtlasData folder in SharePoint to populate this section.</p>`;
  } else {
    notesEl.innerHTML = marked.parse(notesText);
  }
}

load();
</script>
</body>
</html>
