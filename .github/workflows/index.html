<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas — Global Overview</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
  <div>
    <h1>Atlas</h1>
    <div class="tagline">Institutional asset owner database — global overview</div>
  </div>
</header>

<main>
  <div class="summary-bar" id="summary-bar"></div>

  <h2>Countries</h2>
  <table>
    <thead>
      <tr>
        <th>Country</th>
        <th class="numeric">Institutions tracked</th>
        <th class="numeric">Total AUM tracked (local ccy, thousands)</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="country-rows"></tbody>
  </table>

  <p class="note" id="global-note"></p>
</main>

<script>
async function load() {
  const res = await fetch('data/global.json');
  const data = await res.json();

  const countries = data.countries.slice().sort((a, b) => b.total_ps_assets_thousands - a.total_ps_assets_thousands);

  const totalInstitutions = countries.reduce((s, c) => s + c.institutions_tracked, 0);
  const built = countries.filter(c => c.status === 'built').length;

  document.getElementById('summary-bar').innerHTML = `
    <div class="stat-card"><div class="value">${countries.length}</div><div class="label">Countries in scope</div></div>
    <div class="stat-card"><div class="value">${built}</div><div class="label">Country pages built</div></div>
    <div class="stat-card"><div class="value">${totalInstitutions.toLocaleString()}</div><div class="label">Institutions tracked</div></div>
  `;

  const rows = countries.map(c => {
    const name = c.status === 'built'
      ? `<a class="country-link" href="${c.href}">${c.name}</a>`
      : c.name;
    const status = c.status === 'built'
      ? `<span class="badge bottom-up">Built</span>`
      : `<span class="status-pill">Coming soon</span>`;
    return `<tr>
      <td>${name}</td>
      <td class="numeric">${c.institutions_tracked.toLocaleString()}</td>
      <td class="numeric">${c.total_ps_assets_thousands.toLocaleString()}</td>
      <td>${status}</td>
    </tr>`;
  }).join('');

  document.getElementById('country-rows').innerHTML = rows;
  document.getElementById('global-note').textContent = data.generated_note;
}
load();
</script>
</body>
</html>
